<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUVA • Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f3f4f6;
        }
        
        .heading-font {
            font-family: 'Playfair Display', serif;
        }

        .admin-panel {
            background: #111111;
        }

        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .drop-zone {
            transition: all 0.3s ease;
        }
        
        .drop-zone.dragover {
            border-color: #9ca3af;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN SCREEN (shown first) -->
    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="max-w-md w-full mx-4 bg-zinc-950 rounded-3xl p-12 border border-gray-800">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-black font-bold text-3xl">N</div>
            </div>
            <h1 class="heading-font text-4xl text-center mb-2">NUVA ADMIN</h1>
            <p class="text-gray-400 text-center mb-8">Enter your credentials</p>
            
            <div class="space-y-4">
                <input id="admin-password" type="password" placeholder="Passkey" 
                       class="w-full bg-transparent border border-gray-700 rounded-2xl px-6 py-5 outline-none focus:border-gray-400">
                <button onclick="attemptLogin()" 
                        class="w-full bg-white text-black py-5 rounded-2xl font-semibold hover:bg-gray-200 transition">
                    ACCESS PANEL
                </button>
            </div>
            
            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-gray-500 hover:text-gray-400 transition">
                    ← Return to Journal
                </a>
            </div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD (hidden by default) -->
    <div id="admin-dashboard" class="hidden admin-panel min-h-screen">
        <div class="flex h-screen">
            <!-- ADMIN SIDEBAR -->
            <div class="w-72 bg-black border-r border-gray-800 p-8 flex flex-col">
                <div class="flex items-center gap-3 mb-16">
                    <div class="w-8 h-8 bg-white rounded-2xl flex items-center justify-center text-black font-bold">N</div>
                    <div class="heading-font text-3xl">NUVA ADMIN</div>
                </div>
                
                <div class="space-y-2">
                    <button onclick="switchAdminTab(0)" id="tab-0"
                            class="admin-tab w-full text-left px-6 py-4 rounded-3xl flex items-center gap-4 hover:bg-gray-900 transition bg-gray-900">
                        <i class="fa-solid fa-plus"></i>
                        <span class="font-medium">New Entry</span>
                    </button>
                    <button onclick="switchAdminTab(1)" id="tab-1"
                            class="admin-tab w-full text-left px-6 py-4 rounded-3xl flex items-center gap-4 hover:bg-gray-900 transition">
                        <i class="fa-solid fa-list"></i>
                        <span class="font-medium">Manage Entries</span>
                    </button>
                    <button onclick="switchAdminTab(2)" id="tab-2"
                            class="admin-tab w-full text-left px-6 py-4 rounded-3xl flex items-center gap-4 hover:bg-gray-900 transition">
                        <i class="fa-solid fa-comments"></i>
                        <span class="font-medium">Comments Overview</span>
                    </button>
                </div>
                
                <div class="mt-auto">
                    <button onclick="logoutAdmin()" 
                            class="w-full py-4 text-red-400 hover:bg-red-950/30 rounded-3xl flex items-center justify-center gap-3 transition">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>LOCK ADMIN</span>
                    </button>
                </div>
            </div>

            <!-- ADMIN CONTENT -->
            <div class="flex-1 p-12 overflow-auto">
                <!-- NEW ENTRY TAB -->
                <div id="admin-tab-0">
                    <h1 class="heading-font text-5xl mb-2">New Journal Entry</h1>
                    <p class="text-gray-400 mb-12">Publish thoughts that matter.</p>
                    
                    <div class="max-w-2xl">
                        <div class="space-y-8">
                            <div>
                                <label class="block text-xs uppercase tracking-widest mb-2">Featured Image URL</label>
                                <input id="new-image" type="text" placeholder="https://picsum.photos/id/1015/1200/800" 
                                       class="w-full bg-transparent border border-gray-700 focus:border-gray-400 rounded-3xl px-7 py-6 text-lg outline-none">
                            </div>

                            <!-- DRAG & DROP IMAGE UPLOAD -->
                            <div>
                                <label class="block text-xs uppercase tracking-widest mb-2">Or Upload from Computer</label>
                                <div class="relative">
                                    <div id="drop-zone" class="drop-zone border-2 border-dashed border-gray-700 rounded-3xl p-8 text-center hover:border-gray-500 transition cursor-pointer">
                                        <input type="file" id="file-input" accept="image/*" class="hidden">
                                        <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-500 mb-3"></i>
                                        <p class="text-gray-400">Drag & drop an image here, or <span class="text-white underline">click to browse</span></p>
                                        <p class="text-xs text-gray-600 mt-2">Maximum file size: 5MB</p>
                                    </div>
                                    <div id="image-preview" class="hidden mt-4 relative">
                                        <img id="preview-img" src="" alt="Preview" class="w-full h-48 object-cover rounded-2xl">
                                        <button onclick="removeImage()" class="absolute top-2 right-2 bg-black/70 text-white w-8 h-8 rounded-full hover:bg-black flex items-center justify-center">
                                            <i class="fa-solid fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-xs uppercase tracking-widest mb-2">Title</label>
                                <input id="new-title" type="text" placeholder="The Quiet Revolution" 
                                       class="w-full bg-transparent border border-gray-700 focus:border-gray-400 rounded-3xl px-7 py-6 text-3xl outline-none">
                            </div>
                            
                            <div>
                                <label class="block text-xs uppercase tracking-widest mb-2">Excerpt (one line)</label>
                                <input id="new-excerpt" type="text" placeholder="A reflection on minimalism in a noisy world..." 
                                       class="w-full bg-transparent border border-gray-700 focus:border-gray-400 rounded-3xl px-7 py-6 outline-none">
                            </div>
                            
                            <div>
                                <label class="block text-xs uppercase tracking-widest mb-2">Full Content (HTML supported)</label>
                                <textarea id="new-content" rows="14" 
                                    class="w-full bg-transparent border border-gray-700 focus:border-gray-400 rounded-3xl px-7 py-6 outline-none resize-y font-mono text-sm"
                                    placeholder="&lt;p&gt;Your thoughts here...&lt;/p&gt;&lt;blockquote&gt;Quote&lt;/blockquote&gt;"></textarea>
                            </div>
                            
                            <button onclick="publishNewPost()" 
                                    class="w-full bg-white text-black py-7 rounded-3xl font-semibold text-lg hover:scale-105 active:scale-95 transition flex items-center justify-center gap-3">
                                <i class="fa-solid fa-paper-plane"></i>
                                PUBLISH TO JOURNAL
                            </button>
                        </div>
                    </div>
                </div>

                <!-- MANAGE ENTRIES TAB -->
                <div id="admin-tab-1" class="hidden">
                    <h1 class="heading-font text-5xl mb-8">Manage Entries</h1>
                    <div id="manage-list" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- COMMENTS OVERVIEW TAB -->
                <div id="admin-tab-2" class="hidden">
                    <h1 class="heading-font text-5xl mb-8">All Comments</h1>
                    <div id="all-comments-list" class="space-y-6">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN EDIT MODAL -->
    <div id="edit-modal" onclick="if(event.target.id==='edit-modal') closeEditModal()" 
         class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[9999]">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-950 w-full max-w-2xl mx-4 rounded-3xl p-10">
            <h2 class="heading-font text-4xl mb-8">Edit Entry</h2>
            
            <input id="edit-id" type="hidden">
            
            <div class="space-y-6">
                <input id="edit-image" type="text" class="w-full bg-transparent border border-gray-700 rounded-3xl px-6 py-5">
                <input id="edit-title" type="text" class="w-full bg-transparent border border-gray-700 rounded-3xl px-6 py-5 text-2xl">
                <input id="edit-excerpt" type="text" class="w-full bg-transparent border border-gray-700 rounded-3xl px-6 py-5">
                <textarea id="edit-content" rows="10" class="w-full bg-transparent border border-gray-700 rounded-3xl px-6 py-5 font-mono text-sm"></textarea>
            </div>
            
            <div class="flex gap-4 mt-10">
                <button onclick="saveEditedPost()" 
                        class="flex-1 py-6 bg-white text-black rounded-3xl font-medium">SAVE CHANGES</button>
                <button onclick="closeEditModal()" 
                        class="flex-1 py-6 border border-gray-700 rounded-3xl">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage (shared with main blog via localStorage)
        let posts = [];
        let uploadedImageData = null;
        
        function loadPosts() {
            const saved = localStorage.getItem('nuvaPosts');
            if (saved) {
                posts = JSON.parse(saved);
            } else {
                // Seed with sample posts if none exist
                posts = [
                    {
                        id: 1,
                        title: "The Architecture of Silence",
                        excerpt: "In an age of constant noise, the most radical act is stillness.",
                        content: `<p class="mb-6">We live in a world engineered for distraction. Notifications, algorithms, endless scrolls — all designed to keep us from the one thing that truly matters: presence.</p>
                                  <p class="mb-6">The greatest thinkers of our time — from Seneca to Simone Weil — understood that clarity emerges only in silence. Yet we fear it. We fill every quiet moment with sound.</p>
                                  <blockquote class="border-l-4 border-gray-400 pl-8 italic text-2xl my-12">“Silence is the language of God; all else is poor translation.”</blockquote>
                                  <p>Perhaps the most beautiful spaces we can create are the ones that invite nothing but thought.</p>`,
                        image: "https://picsum.photos/id/1015/1200/800",
                        date: "March 12, 2026",
                        comments: []
                    },
                    {
                        id: 2,
                        title: "Craft Over Scale",
                        excerpt: "Why quality will always outlive quantity.",
                        content: `<p>The internet told us bigger is better. More followers, more likes, more reach. Yet the work that truly moves people has always been the work done with obsessive care for the few.</p>
                                  <p>Handwritten letters still carry more weight than mass emails. A single perfectly cut garment outlives a thousand fast-fashion pieces. The same principle applies to ideas.</p>`,
                        image: "https://picsum.photos/id/201/1200/800",
                        date: "March 10, 2026",
                        comments: [
                            { name: "Elena Voss", text: "This is exactly what I needed to hear today. Thank you.", date: "2h ago" }
                        ]
                    },
                    {
                        id: 3,
                        title: "The Art of Patience",
                        excerpt: "Good things take time. Great things take even longer.",
                        content: `<p>In a world of instant gratification, patience has become a forgotten virtue. We want results now, answers now, success now. But the most meaningful creations in history weren't built in a day.</p>
                                  <p>Michelangelo spent four years painting the Sistine Chapel. Darwin took two decades to develop his theory of evolution. True mastery requires time — and our willingness to wait for it.</p>`,
                        image: "https://picsum.photos/id/103/1200/800",
                        date: "March 8, 2026",
                        comments: []
                    }
                ];
                savePosts();
            }
        }
        
        function savePosts() {
            localStorage.setItem('nuvaPosts', JSON.stringify(posts));
        }
        
        // Login functionality
        function attemptLogin() {
            const password = document.getElementById('admin-password').value;
            if (password === "nuva@admin.blog!256") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                switchAdminTab(0);
            } else {
                alert("Invalid passkey. Access denied.");
            }
        }
        
        function logoutAdmin() {
            if (confirm("Lock admin panel?")) {
                document.getElementById('admin-dashboard').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
            }
        }
        
        function switchAdminTab(tab) {
            // Hide all tabs
            document.getElementById('admin-tab-0').classList.add('hidden');
            document.getElementById('admin-tab-1').classList.add('hidden');
            document.getElementById('admin-tab-2').classList.add('hidden');
            
            // Show selected
            document.getElementById(`admin-tab-${tab}`).classList.remove('hidden');
            
            // Update active button
            for (let i = 0; i < 3; i++) {
                const btn = document.getElementById(`tab-${i}`);
                if (btn) {
                    if (i === tab) {
                        btn.classList.add('bg-gray-900');
                    } else {
                        btn.classList.remove('bg-gray-900');
                    }
                }
            }
            
            if (tab === 1) renderManageList();
            if (tab === 2) renderAllComments();
        }
        
        // Image upload functionality
        document.addEventListener('DOMContentLoaded', function() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            
            if (dropZone && fileInput) {
                // Click to browse
                dropZone.addEventListener('click', () => fileInput.click());
                
                // File selection via browse
                fileInput.addEventListener('change', handleFileSelect);
                
                // Drag and drop events
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });
                
                dropZone.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                });
                
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        handleFile(files[0]);
                    }
                });
            }
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            handleFile(file);
        }

        function handleFile(file) {
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) { // 5MB limit
                alert('File size must be less than 5MB.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImageData = e.target.result;
                
                // Show preview
                document.getElementById('drop-zone').classList.add('hidden');
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('preview-img').src = uploadedImageData;
                
                // Auto-fill the URL input with a note
                document.getElementById('new-image').value = '[Image uploaded from computer]';
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            uploadedImageData = null;
            document.getElementById('drop-zone').classList.remove('hidden');
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('file-input').value = '';
            document.getElementById('new-image').value = '';
        }
        
        function publishNewPost() {
            const title = document.getElementById('new-title').value.trim();
            const excerpt = document.getElementById('new-excerpt').value.trim();
            const content = document.getElementById('new-content').value.trim();
            let image = document.getElementById('new-image').value.trim();
            
            if (!title || !excerpt || !content) {
                alert("Title, excerpt and content are required.");
                return;
            }
            
            // Use uploaded image if available
            if (uploadedImageData) {
                image = uploadedImageData;
            } else if (!image) {
                image = "https://picsum.photos/id/" + Math.floor(Math.random()*300) + "/1200/800";
            }
            
            const newPost = {
                id: Date.now(),
                title: title,
                excerpt: excerpt,
                content: content,
                image: image,
                date: new Intl.DateTimeFormat('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).format(new Date()),
                comments: []
            };
            
            posts.unshift(newPost);
            savePosts();
            
            // Clear form
            document.getElementById('new-title').value = '';
            document.getElementById('new-excerpt').value = '';
            document.getElementById('new-content').value = '';
            document.getElementById('new-image').value = '';
            removeImage();
            
            alert("Entry published successfully!");
        }
        
        function renderManageList() {
            const container = document.getElementById('manage-list');
            container.innerHTML = '';
            
            posts.forEach((post) => {
                const row = document.createElement('div');
                row.className = 'bg-zinc-900 rounded-3xl p-8 flex justify-between items-center group';
                row.innerHTML = `
                    <div class="flex-1">
                        <div class="font-medium text-xl">${post.title}</div>
                        <div class="text-xs text-gray-400 mt-1">${post.date}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="editPost(${post.id}); event.stopImmediatePropagation()" 
                                class="px-6 py-3 text-sm border border-gray-700 rounded-2xl hover:border-gray-400 transition">EDIT</button>
                        <button onclick="deletePost(${post.id}); event.stopImmediatePropagation()" 
                                class="px-6 py-3 text-sm text-red-400 hover:bg-red-950/30 rounded-2xl transition">DELETE</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }
        
        function editPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            
            document.getElementById('edit-id').value = post.id;
            document.getElementById('edit-image').value = post.image;
            document.getElementById('edit-title').value = post.title;
            document.getElementById('edit-excerpt').value = post.excerpt;
            document.getElementById('edit-content').value = post.content;
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }
        
        function saveEditedPost() {
            const id = parseInt(document.getElementById('edit-id').value);
            const post = posts.find(p => p.id === id);
            if (!post) return;
            
            post.image = document.getElementById('edit-image').value;
            post.title = document.getElementById('edit-title').value;
            post.excerpt = document.getElementById('edit-excerpt').value;
            post.content = document.getElementById('edit-content').value;
            
            savePosts();
            renderManageList();
            closeEditModal();
            alert("Entry updated successfully.");
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('flex');
        }
        
        function deletePost(id) {
            if (!confirm("Permanently delete this entry?")) return;
            
            posts = posts.filter(p => p.id !== id);
            savePosts();
            renderManageList();
        }
        
        function renderAllComments() {
            const container = document.getElementById('all-comments-list');
            container.innerHTML = '';
            
            let hasComments = false;
            
            posts.forEach(post => {
                if (!post.comments || post.comments.length === 0) return;
                hasComments = true;
                
                const section = document.createElement('div');
                section.className = 'border border-gray-800 rounded-3xl p-8';
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div class="heading-font text-2xl">${post.title}</div>
                        <div class="text-xs bg-gray-800 px-4 py-2 rounded-2xl">${post.comments.length} comments</div>
                    </div>
                `;
                
                const commentsDiv = document.createElement('div');
                commentsDiv.className = 'space-y-6';
                
                post.comments.forEach(c => {
                    const cdiv = document.createElement('div');
                    cdiv.className = 'flex gap-6 bg-zinc-900 p-6 rounded-2xl';
                    cdiv.innerHTML = `
                        <div>
                            <div class="w-9 h-9 bg-white/10 rounded-2xl flex items-center justify-center text-xs">${c.name[0]}</div>
                        </div>
                        <div class="flex-1">
                            <span class="font-medium">${c.name}</span>
                            <span class="ml-4 text-xs text-gray-400">${c.date}</span>
                            <p class="mt-3 text-sm">${c.text}</p>
                        </div>
                    `;
                    commentsDiv.appendChild(cdiv);
                });
                
                section.appendChild(commentsDiv);
                container.appendChild(section);
            });
            
            if (!hasComments) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">No comments have been left yet.</div>`;
            }
        }
        
        // Keyboard escape support
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                const editModal = document.getElementById('edit-modal');
                if (!editModal.classList.contains('hidden')) closeEditModal();
            }
        });
        
        // Initialize
        window.onload = function() {
            loadPosts();
        };
    </script>
</body>
</html>
