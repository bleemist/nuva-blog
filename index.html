<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NUVA • Journal — Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --nuva-orange: #fe4f04;
            --nuva-orange-light: #ff7a2d;
            --nuva-purple: #9b6aff;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f3f4f6;
            overflow-x: hidden;
            width: 100%;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }
        
        html, body {
            overflow-x: hidden;
            width: 100%;
            height: auto;
            min-height: 100vh;
        }
        
        .tail-container {
            width: 100%;
            overflow-x: hidden;
            position: relative;
        }
        
        .heading-font {
            font-family: 'Playfair Display', serif;
        }

        .nuva-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: conic-gradient(from 200deg, #fe4f04, #ff7a2d 90deg, #9b6aff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 15px rgba(254, 79, 4, 0.2);
            flex-shrink: 0;
            transition: transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .nuva-logo::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent 60%, rgba(255,255,255,0.2) 70%, transparent 80%);
            animation: shine 8s infinite;
            pointer-events: none;
        }
        
        @keyframes shine { 
            0% { transform: translateX(-100%) rotate(15deg); } 
            100% { transform: translateX(200%) rotate(15deg); } 
        }
        
        .post-card {
            transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s ease;
            will-change: transform;
        }
        
        .post-card:active {
            transform: scale(0.98);
        }
        
        @media (hover: hover) {
            .post-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            }
        }
        
        .modal {
            animation: modalPop 0.25s ease-out;
        }
        
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: #fe4f04;
            transition: width 0.2s ease;
        }
        
        .nav-link:hover:after {
            width: 100%;
        }
        
        .rich-text {
            line-height: 1.75;
            font-size: 1rem;
        }
        
        .rich-text p {
            margin-bottom: 1.5rem;
        }
        
        .rich-text img, 
        .rich-text video,
        .rich-text iframe {
            max-width: 100%;
            height: auto;
            border-radius: 1.25rem;
            margin: 1.8rem 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: block;
        }
        
        @media (max-width: 640px) {
            .nuva-logo {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
            .rich-text {
                font-size: 0.95rem;
                line-height: 1.65;
            }
            .rich-text blockquote {
                font-size: 1.1rem;
                padding-left: 1rem;
                margin: 1.5rem 0;
            }
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #fe4f04;
            border-radius: 8px;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .content-badge {
            position: absolute;
            top: 0.85rem;
            left: 0.85rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 0.35rem 0.85rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.75rem;
        }
        
        @media (max-width: 700px) {
            .posts-grid {
                gap: 1.25rem;
                grid-template-columns: 1fr;
            }
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1.25rem;
            background: #000;
        }
        
        .video-wrapper iframe,
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .loading-spinner {
            border: 3px solid #1a1a1a;
            border-top: 3px solid #fe4f04;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .sync-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 11px;
            z-index: 1000;
            border-left: 3px solid #10b981;
            pointer-events: none;
        }
        
        .comment-avatar {
            background: linear-gradient(135deg, #fe4f04, #ff7a2d);
        }
        
        .online-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="tail-container">
    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/85 backdrop-blur-xl border-b border-gray-800/70 shadow-sm">
        <div class="w-full max-w-7xl mx-auto px-5 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="nuva-logo relative">
                    <span class="relative z-10 text-sm tracking-tight">NUVA</span>
                </div>
                <div class="flex flex-col">
                    <span class="heading-font text-2xl sm:text-3xl tracking-tighter font-bold leading-tight">NUVA</span>
                    <span class="text-[0.55rem] sm:text-[0.65rem] tracking-[2px] text-gray-400 font-medium">JOURNAL</span>

            <div class="flex items-center gap-5 sm:gap-8 text-xs sm:text-sm font-medium">

        </div>
    </nav>

    <div class="pt-20 sm:pt-24">
        <!-- HERO SECTION -->
        <div class="relative min-h-[85vh] flex items-center justify-center overflow-hidden bg-[radial-gradient(#1f2937_1px,transparent_1px)] bg-[length:30px_30px]">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/60 to-black"></div>
            <div class="max-w-4xl mx-auto text-center px-5 relative z-10">
                <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-5 py-2 rounded-full text-[0.65rem] tracking-widest mb-6">
                    <div class="w-1.5 h-1.5 bg-[#fe4f04] rounded-full animate-pulse"></div>
                    <span id="live-badge">CLOUD SYNCED</span>
                </div>
                <h1 class="heading-font text-5xl sm:text-7xl md:text-8xl font-bold tracking-tighter leading-[1.1] mb-5">
                    THOUGHTS.<br>UNFILTERED.
                </h1>
                <p class="text-base sm:text-xl text-gray-300 max-w-md mx-auto mb-9 px-2">
                    A minimalist journal of ideas, crafted in pure black & white.
                </p>
                <button onclick="scrollToPosts(event)" class="px-8 sm:px-10 py-4 bg-white text-black font-semibold rounded-2xl hover:bg-gray-200 transition flex items-center gap-2 mx-auto group text-sm shadow-lg">
                    BEGIN READING

                <i class="fa-solid fa-chevron-down animate-bounce text-[#fe4f04]"></i>

        <div id="posts-section" class="w-full max-w-7xl mx-auto px-5 sm:px-6 py-16 sm:py-24">
            <div class="flex flex-col sm:flex-row justify-between items-end mb-10 gap-3">

                    <span class="text-[0.65rem] uppercase tracking-[2px] text-gray-400">Latest Entries</span>

                    <a href="#" target="_blank" class="hover:text-[#fe4f04] transition"><i class="fa-brands fa-linkedin"></i></a>

    <!-- POST MODAL -->
    <div id="post-modal" onclick="if(event.target===this) closeModal()" class="hidden fixed inset-0 bg-black/95 backdrop-blur-sm items-center justify-center z-[9999] p-3 sm:p-5 overflow-auto">
        <div onclick="event.stopPropagation()" class="modal bg-zinc-950 w-full max-w-4xl max-h-[95vh] overflow-y-auto rounded-2xl sm:rounded-3xl shadow-2xl relative">
            <div id="modal-media" class="relative w-full bg-cover bg-center" style="min-height: 200px;">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl transition z-30 backdrop-blur-sm">

                                   class="bg-transparent border border-gray-700 rounded-xl px-5 py-3 outline-none focus:border-[#fe4f04] text-sm">
                            <input id="comment-email" type="email" placeholder="Email (optional)" 
                                   class="bg-transparent border border-gray-700 rounded-xl px-5 py-3 outline-none focus:border-[#fe4f04] text-sm">

                        <textarea id="comment-text" rows="3" placeholder="Share your thoughts..." 
                                  class="mt-4 w-full bg-transparent border border-gray-700 rounded-xl px-5 py-3 outline-none focus:border-[#fe4f04] text-sm"></textarea>
                        <button onclick="submitComment()" 
                                class="mt-5 px-8 py-3 bg-[#fe4f04] text-white rounded-xl hover:bg-[#ff7a2d] transition font-medium">

    <!-- Sync Status -->
    <div id="sync-status" class="sync-status">
        <i class="fa-solid fa-cloud-check mr-1"></i>
        <span>Connected</span>
    </div>

    <script>
        // Firebase Configuration - SAME as admin panel
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        let db = null;
        let useCloud = false;
        let posts = [];
        let currentPostId = null;
        let unsubscribeRealtime = null;
        
        // Initialize Firebase
        function initFirebase() {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                try {
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    useCloud = true;
                    updateSyncStatus("Cloud connected", "success");
                    return true;
                } catch(e) {
                    console.warn("Firebase init failed:", e);
                    useCloud = false;
                    updateSyncStatus("Offline mode", "error");
                    return false;
                }
            }
            updateSyncStatus("Local only", "warning");
            return false;
        }
        
        // Load posts with real-time listener
        function setupRealtimeListener() {
            if (!useCloud || !db) {
                loadFromLocalStorage();
                return;
            }
            
            updateSyncStatus("Listening for updates...", "syncing");
            
            // Real-time listener for posts
            unsubscribeRealtime = db.collection('posts')
                .orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    posts = [];
                    snapshot.forEach(doc => {
                        const postData = doc.data();
                        posts.push({
                            id: parseInt(doc.id),
                            ...postData,
                            // Ensure comments array exists
                            comments: postData.comments || []
                        });
                    });
                    
                    // Save to localStorage as cache
                    localStorage.setItem('nuvaPosts', JSON.stringify(posts));
                    
                    // Update UI
                    renderPostsGrid();
                    updateSyncStatus("Live", "success");
                    
                    // If modal is open with current post, refresh it
                    if (currentPostId) {
                        const updatedPost = posts.find(p => p.id === currentPostId);
                        if (updatedPost) {
                            refreshOpenModal(updatedPost);
                        }
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    updateSyncStatus("Sync error - using cache", "error");
                    loadFromLocalStorage();
                });
        }
        
        // Load from localStorage as fallback
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('nuvaPosts');
            if (saved) {
                posts = JSON.parse(saved);
            } else {
                posts = [];
            }
            renderPostsGrid();
        }
        
        // Save comment to cloud
        async function saveCommentToCloud(postId, comment) {
            if (!useCloud || !db) {
                // Local only mode
                const post = posts.find(p => p.id === postId);
                if (post) {
                    if (!post.comments) post.comments = [];
                    post.comments.unshift(comment);
                    localStorage.setItem('nuvaPosts', JSON.stringify(posts));
                }
                return;
            }
            
            try {
                const postRef = db.collection('posts').doc(postId.toString());
                const postDoc = await postRef.get();
                const existingComments = postDoc.exists ? (postDoc.data().comments || []) : [];
                existingComments.unshift(comment);
                await postRef.update({ comments: existingComments });
                updateSyncStatus("Comment saved", "success");
                setTimeout(() => updateSyncStatus("Live", "success"), 2000);
            } catch(e) {
                console.error("Error saving comment:", e);
                // Fallback to local
                const post = posts.find(p => p.id === postId);
                if (post) {
                    if (!post.comments) post.comments = [];
                    post.comments.unshift(comment);
                    localStorage.setItem('nuvaPosts', JSON.stringify(posts));
                }
                updateSyncStatus("Comment saved locally", "warning");
            }
        }
        
        // Render posts grid
        function renderPostsGrid() {
            const container = document.getElementById('posts-grid');
            const loading = document.getElementById('loading-spinner');
            const emptyState = document.getElementById('empty-state');
            
            if (!container) return;
            
            loading.classList.add('hidden');
            
            if (posts.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            emptyState.classList.add('hidden');
            container.innerHTML = '';
            
            // Update post count display
            const countDisplay = document.getElementById('post-count-display');
            if (countDisplay) {
                countDisplay.innerHTML = `<span class="online-dot"></span> ${posts.length} entry${posts.length !== 1 ? 's' : ''}`;
            }
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card bg-zinc-900 rounded-2xl overflow-hidden cursor-pointer group relative flex flex-col';
                
                // Determine content type for badge
                let contentType = 'text';
                let mediaPreview = '';
                
                if (post.mediaBlocks && post.mediaBlocks.length > 0) {
                    const firstMedia = post.mediaBlocks[0];
                    if (firstMedia.type === 'image') {
                        contentType = 'image';
                        mediaPreview = `<div class="h-52 sm:h-64 bg-cover bg-center transition-transform group-hover:scale-105 duration-700" style="background-image: url('${firstMedia.url}'); background-size: cover;"></div>`;
                    } else if (firstMedia.type === 'video') {
                        contentType = 'video';
                        mediaPreview = `<div class="h-52 sm:h-64 bg-gray-900 flex items-center justify-center"><i class="fa-solid fa-play-circle text-5xl text-[#fe4f04] opacity-90"></i><span class="ml-2 text-xs uppercase tracking-wide">video</span></div>`;
                    } else if (firstMedia.type === 'gallery') {
                        contentType = 'gallery';
                        mediaPreview = `<div class="h-52 sm:h-64 bg-gradient-to-br from-gray-800 to-black flex items-center justify-center"><i class="fa-regular fa-images text-5xl text-gray-500"></i></div>`;
                    }
                } else {
                    mediaPreview = `<div class="h-52 sm:h-64 bg-gradient-to-br from-gray-800 to-black flex items-center justify-center"><i class="fa-regular fa-file-lines text-5xl text-gray-500"></i></div>`;
                }
                
                const badgeIcon = contentType === 'video' ? 'fa-video' : (contentType === 'image' ? 'fa-image' : (contentType === 'gallery' ? 'fa-images' : 'fa-quote-right'));
                const badgeHtml = `<div class="content-badge"><i class="fa-solid ${badgeIcon} text-[#fe4f04] text-xs"></i><span class="text-white/90">${contentType.toUpperCase()}</span></div>`;
                
                card.innerHTML = `
                    <div class="relative overflow-hidden">${mediaPreview}${badgeHtml}</div>
                    <div class="p-5 sm:p-7 flex-1">
                        <div class="text-[0.6rem] text-gray-400 mb-2">${post.date || 'Recent'}</div>
                        <h3 class="heading-font text-2xl sm:text-3xl tracking-tighter leading-tight mb-2 group-hover:text-[#fe4f04] transition">${escapeHtml(post.title)}</h3>
                        <p class="text-sm text-gray-400 line-clamp-3">${escapeHtml(post.excerpt)}</p>
                        <div class="mt-4 flex items-center gap-3 text-xs text-gray-500">
                            <span><i class="fa-regular fa-comment"></i> ${post.comments?.length || 0}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => openPostModal(post.id);
                container.appendChild(card);
            });
        }
        
        function refreshOpenModal(post) {
            if (!post) return;
            
            // Update media if exists
            const modalMedia = document.getElementById('modal-media');
            if (post.mediaBlocks && post.mediaBlocks.length > 0) {
                const firstMedia = post.mediaBlocks[0];
                if (firstMedia.type === 'image') {
                    modalMedia.style.backgroundImage = `url('${firstMedia.url}')`;
                    modalMedia.style.backgroundSize = 'cover';
                    modalMedia.style.backgroundPosition = 'center 30%';
                    modalMedia.style.minHeight = '280px';
                    modalMedia.innerHTML = `<button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl z-30"><i class="fa-solid fa-times"></i></button>`;
                }
            }
            
            document.getElementById('modal-date').innerText = post.date || 'Recent';
            document.getElementById('modal-title').innerText = post.title;
            
            // Build content with media blocks
            let fullContent = '';
            if (post.mediaBlocks) {
                post.mediaBlocks.forEach(block => {
                    if (block.type === 'image') {
                        fullContent += `<img src="${block.url}" class="rounded-2xl my-4 max-w-full" />`;
                    } else if (block.type === 'video') {
                        if (block.url.includes('youtube') || block.url.includes('vimeo')) {
                            let embedUrl = block.url;
                            if (block.url.includes('watch?v=')) embedUrl = block.url.replace('watch?v=', 'embed/');
                            fullContent += `<div class="video-wrapper my-4"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            fullContent += `<video controls class="rounded-2xl my-4 w-full"><source src="${block.url}" type="video/mp4"></video>`;
                        }
                    } else if (block.type === 'gallery' && block.images) {
                        fullContent += `<div class="grid grid-cols-2 gap-3 my-4">`;
                        block.images.forEach(img => {
                            fullContent += `<img src="${img}" class="rounded-xl w-full object-cover aspect-square" />`;
                        });
                        fullContent += `</div>`;
                    }
                });
            }
            fullContent += post.content || '';
            document.getElementById('modal-content').innerHTML = fullContent;
            
            // Update comments
            renderCommentsForModal(post);
        }
        
        function openPostModal(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            currentPostId = id;
            
            const modalMedia = document.getElementById('modal-media');
            if (post.mediaBlocks && post.mediaBlocks.length > 0) {
                const firstMedia = post.mediaBlocks[0];
                if (firstMedia.type === 'image') {
                    modalMedia.style.backgroundImage = `url('${firstMedia.url}')`;
                    modalMedia.style.backgroundSize = 'cover';
                    modalMedia.style.backgroundPosition = 'center 30%';
                    modalMedia.style.minHeight = '280px';
                    modalMedia.innerHTML = `<button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl z-30"><i class="fa-solid fa-times"></i></button>`;
                } else {
                    modalMedia.style.backgroundImage = 'none';
                    modalMedia.style.backgroundColor = '#000';
                    modalMedia.style.minHeight = 'auto';
                    modalMedia.innerHTML = `<button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl z-30"><i class="fa-solid fa-times"></i></button>`;
                }
            } else {
                modalMedia.style.backgroundImage = 'none';
                modalMedia.style.backgroundColor = 'transparent';
                modalMedia.style.minHeight = 'auto';
                modalMedia.innerHTML = `<button onclick="closeModal()" class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white w-9 h-9 flex items-center justify-center rounded-xl z-30"><i class="fa-solid fa-times"></i></button>`;
            }
            
            document.getElementById('modal-date').innerText = post.date || 'Recent';
            document.getElementById('modal-title').innerText = post.title;
            
            let fullContent = '';
            if (post.mediaBlocks) {
                post.mediaBlocks.forEach(block => {
                    if (block.type === 'image') {
                        fullContent += `<img src="${block.url}" class="rounded-2xl my-4 max-w-full" />`;
                    } else if (block.type === 'video') {
                        if (block.url.includes('youtube') || block.url.includes('vimeo')) {
                            let embedUrl = block.url;
                            if (block.url.includes('watch?v=')) embedUrl = block.url.replace('watch?v=', 'embed/');
                            fullContent += `<div class="video-wrapper my-4"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            fullContent += `<video controls class="rounded-2xl my-4 w-full"><source src="${block.url}" type="video/mp4"></video>`;
                        }
                    } else if (block.type === 'gallery' && block.images) {
                        fullContent += `<div class="grid grid-cols-2 gap-3 my-4">`;
                        block.images.forEach(img => {
                            fullContent += `<img src="${img}" class="rounded-xl w-full object-cover aspect-square" />`;
                        });
                        fullContent += `</div>`;
                    }
                });
            }
            fullContent += post.content || '';
            document.getElementById('modal-content').innerHTML = fullContent;
            
            renderCommentsForModal(post);
            
            const modal = document.getElementById('post-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            document.body.classList.add('modal-open');
        }
        
        function renderCommentsForModal(post) {
            const container = document.getElementById('comments-list');
            const countSpan = document.getElementById('comment-count');
            if (!container) return;
            
            const comments = post.comments || [];
            if (countSpan) countSpan.textContent = `(${comments.length})`;
            
            if (comments.length === 0) {
                container.innerHTML = '<div class="text-center py-6 text-gray-400 text-sm">No comments yet. Be the first to share your thoughts.</div>';
                return;
            }
            
            container.innerHTML = '';
            comments.forEach(comment => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'flex gap-4';
                commentDiv.innerHTML = `
                    <div class="comment-avatar w-8 h-8 rounded-xl flex items-center justify-center text-white text-xs font-bold">${comment.name.charAt(0).toUpperCase()}</div>
                    <div class="flex-1">
                        <div class="flex flex-wrap justify-between gap-1">
                            <span class="font-medium text-sm">${escapeHtml(comment.name)}</span>
                            <span class="text-[0.6rem] text-gray-400">${comment.date}</span>
                        </div>
                        <p class="text-sm text-gray-300 mt-1">${escapeHtml(comment.text)}</p>
                    </div>
                `;
                container.appendChild(commentDiv);
            });
        }
        
        async function submitComment() {
            const name = document.getElementById('comment-name').value.trim();
            const text = document.getElementById('comment-text').value.trim();
            
            if (!name || !text) {
                alert("Please enter your name and comment.");
                return;
            }
            
            const comment = {
                name: name,
                text: text,
                date: "just now",
                timestamp: new Date().toISOString()
            };
            
            await saveCommentToCloud(currentPostId, comment);
            
            // Clear form
            document.getElementById('comment-name').value = '';
            document.getElementById('comment-email').value = '';
            document.getElementById('comment-text').value = '';
        }
        
        function closeModal() {
            const modal = document.getElementById('post-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
            document.body.classList.remove('modal-open');
            currentPostId = null;
        }
        
        function refreshPosts() {
            updateSyncStatus("Refreshing...", "syncing");
            if (unsubscribeRealtime) {
                unsubscribeRealtime();
                setupRealtimeListener();
            } else {
                setupRealtimeListener();
            }
        }
        
        function scrollToPosts(e) {
            if (e) e.preventDefault();
            const postsSection = document.getElementById('posts-section');
            if (postsSection) postsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showAboutModal(e) {
            e?.preventDefault();
            alert("NUVA Journal — Cloud Edition\n\nA minimalist publication dedicated to timeless ideas.\n\n✨ Features:\n• Real-time cloud sync\n• Cross-device access\n• Live comments\n• Always backed up\n\nCreated by Muyanja Andrew");
        }
        
        function updateSyncStatus(message, status) {
            const statusDiv = document.getElementById('sync-status');
            if (!statusDiv) return;
            
            const icons = {
                success: 'fa-cloud-check',
                error: 'fa-cloud-slash',
                warning: 'fa-cloud',
                syncing: 'fa-sync-alt fa-spin'
            };
            
            const icon = icons[status] || 'fa-cloud';
            statusDiv.innerHTML = `<i class="fa-solid ${icon} mr-1"></i><span>${message}</span>`;
            statusDiv.style.borderLeftColor = status === 'success' ? '#10b981' : (status === 'error' ? '#ef4444' : '#f59e0b');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Handle escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
        });
        
        // Initialize
        window.onload = () => {
            initFirebase();
            setupRealtimeListener();
        };
    </script>
</body>
</html>
